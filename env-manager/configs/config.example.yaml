# env-manager 配置文件示例
# 编辑节点信息以适配你的集群

nodes:
  # 示例：本地节点
  - name: local-server
    host: localhost
    local: true
    tags: [amd64, linux]

  # 示例：远程 Linux 服务器
  - name: remote-server
    host: 192.168.1.10
    port: 22
    user: user
    auth: key
    key_path: ~/.ssh/id_rsa
    tags: [amd64, linux]

  # 示例：带 GPU 的远程节点
  - name: gpu-node
    host: 10.0.0.5
    port: 22
    user: admin
    auth: key
    key_path: ~/.ssh/id_rsa
    tags: [amd64, linux, gpu]
    gpu_type: nvidia

settings:
  # 单次扫描超时时间
  scan_timeout: 10s

  # SSH连接池大小（每节点）
  ssh_pool_size: 2

  # 扫描结果缓存时间
  cache_ttl: 30s

  # 告警阈值
  alert_thresholds:
    cpu_percent: 90
    memory_percent: 85
    disk_percent: 90

# 数据存储目录（可选，默认使用 ~/.openclaw/skills/env-manager/data）
# data_dir: ~/.openclaw/skills/env-manager/data
